<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 715 200" role="img" aria-label="SAFF ERP">
  <!--
    COMPACT LOCKUP — icon + wordmark, no tagline
    Use for: nav bars, headers, anywhere 150px-300px wide
    v3: R/P counters widened ~40% (not the cosmetic 3% of v2) for real
        legibility improvement in the 64-150px range. Below 64px wide,
        use saff-icon-simple.svg or saff-icon-detailed.svg instead —
        no wordmark reads reliably below that, and this file should
        not be forced smaller than its stated minimum.
    Palette (LOCKED — do not substitute): Vault Navy #0E1D30 ·
        Ledger Green #0E6B55 · Slate #55657A
  -->
