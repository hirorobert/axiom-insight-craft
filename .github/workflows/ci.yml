name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  migration-audit:
    name: Supabase Migration Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run migration auditor (strict)
        run: |
          set -o pipefail
          node scripts/audit_migrations.mjs --strict | tee audit.log
          if ! grep -q '^VERDICT: CLEAN$' audit.log; then
            echo "::error::Migration audit did not report CLEAN."
            exit 1
          fi

  conflict-marker-check:
    name: Merge Conflict Marker Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan for merge conflict markers
        run: |
          set -e
          # Search tracked files for conflict markers. Exclude this workflow file itself.
          # Patterns anchored at line start to avoid false positives in prose.
          if git grep -n -I -E '^(<{7}|={7}|>{7})( |$)' -- ':!.github/workflows/ci.yml'; then
            echo "::error::Merge conflict markers detected. Resolve before merging."
            exit 1
          fi
          echo "No merge conflict markers found."

  lint-build-and-typecheck:
    name: Lint, Build and Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Type check
        run: bunx tsc --noEmit -p tsconfig.app.json

  golden-tests:
    name: Golden Fixture Tests (vitest)
    runs-on: ubuntu-latest
    # Run in parallel with lint-build — tests don't depend on build output
    needs: []

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run golden fixture tests
        run: bun run test
        # Tests cover: computeComplianceScore (pure scoring engine, all grade boundaries,
        # 5 factors, 6 FA2026 fixtures) + computeWearTear (ITA s.34 all 7 classes).
        # These are pure-function tests — no DB, no network, no mocks except supabase client.

  rls-regression:
    name: RLS Regression Suite
    runs-on: ubuntu-latest
    # Requires live DB credentials — only runs when secrets are configured
    if: ${{ github.event_name == 'pull_request' }}
    needs: []

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run RLS regression suite
        # Skips silently if secrets not configured. Otherwise exercises
        # cross-tenant + cross-role isolation on every sensitive table.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::warning::RLS regression skipped — Supabase secrets not configured on this runner."
            exit 0
          fi
          bun run test:rls
