name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-and-typecheck:
    name: Build and Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Type check
        run: bunx tsc --noEmit -p tsconfig.app.json
